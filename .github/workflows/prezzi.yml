name: Aggiorna prezzi

on:
  schedule:
    # ogni ora nei giorni feriali, ~ orario di mercato europeo (UTC).
    # GitHub usa UTC: 6-17 UTC copre ~08:00-19:00 CEST.
    - cron: "5 6-17 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: prezzi
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Scarica prezzi
        run: python fetch_prezzi.py

      - name: Commit dati
        run: |
          git config user.name "mywallet-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prezzi.json storico.json
          if git diff --staged --quiet; then
            echo "Nessuna variazione."
          else
            git commit -m "Prezzi $(date -u +%FT%TZ)"
            git push
          fi
